<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本来のエンジン診断 | LunaRa Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --deep: #080608;
  --mid: #1E1518;
  --text-bright: #F5EDE0;
  --text-mid: #C8B09A;
  --text-dim: #7A6A60;
  --magenta: #8B2055;
  --magenta-light: #C45C8A;
  --teal: #1E6B7A;
  --teal-light: #3DA8B8;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--deep);
  color: var(--text-bright);
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

.cosmos {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(139,32,85,0.06) 0%, transparent 55%),
    linear-gradient(160deg, #080608 0%, #12080E 40%, #080A12 100%);
  pointer-events: none;
}

.cosmos::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 20%, rgba(201,168,76,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 10%, rgba(240,210,200,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, rgba(201,168,76,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 60%, rgba(240,210,200,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 70%, rgba(201,168,76,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 60%, rgba(240,210,200,0.3) 0%, transparent 100%);
  animation: starPulse 8s ease-in-out infinite alternate;
}

@keyframes starPulse { 0%{opacity:.5} 100%{opacity:1} }

.page {
  position: relative; z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.7s ease forwards; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* COVER */
.cover {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 60px 0;
}

.cover-badge {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.4em;
  color: var(--gold); opacity: 0.8;
  margin-bottom: 32px;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(30px, 7vw, 52px);
  font-weight: 300; line-height: 1.2;
  margin-bottom: 8px;
}

.cover-title em { font-style: italic; color: var(--gold-light); display: block; }

.cover-line {
  display: flex; align-items: center; gap: 16px;
  width: 100%; max-width: 320px;
  margin: 20px auto 28px;
}
.cover-line::before, .cover-line::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
}
.cover-line span { color: var(--gold); font-size: 14px; }

.cover-desc {
  font-size: 14px; color: var(--text-mid);
  line-height: 2.1; max-width: 440px;
  margin: 0 auto 40px;
}

.cover-desc strong { color: var(--gold-light); font-weight: 400; }

/* INPUT FORM */
.input-card {
  background: rgba(30,21,24,0.85);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 2px;
  padding: 40px 36px;
  margin: 0 auto 32px;
  position: relative; overflow: hidden;
  max-width: 480px; width: 100%;
}

.input-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.input-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.3em;
  color: var(--gold); opacity: 0.8;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: block; text-align: center;
}

.date-row {
  display: flex; gap: 12px; margin-bottom: 8px;
}

.date-field {
  display: flex; flex-direction: column; gap: 8px;
}

.date-field label {
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.1em; text-align: center;
}

.date-field select, .date-field input {
  background: rgba(20,14,18,0.9);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px;
  color: var(--text-bright);
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
  -webkit-appearance: none;
}

.date-field select:focus, .date-field input:focus {
  border-color: rgba(201,168,76,0.5);
}

.date-field.year { flex: 2; }
.date-field.month { flex: 1.5; }
.date-field.day { flex: 1.5; }

.date-field select option { background: #1E1518; }

.input-note {
  font-size: 11px; color: var(--text-dim);
  text-align: center; margin-top: 16px;
  line-height: 1.8; letter-spacing: 0.05em;
}

.btn-analyze {
  display: block; width: 100%;
  background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
  border: 1px solid rgba(201,168,76,0.5);
  color: var(--gold-light);
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; letter-spacing: 0.15em;
  padding: 18px; cursor: pointer;
  transition: all 0.3s; margin-top: 24px;
}

.btn-analyze:hover:not(:disabled) {
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(201,168,76,0.15);
  transform: translateY(-1px);
}

.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

/* LOADING */
.loading-screen {
  min-height: 60vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 60px 0;
}

.loading-orbit {
  width: 80px; height: 80px;
  border: 1px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: orbit 1.5s linear infinite;
  margin: 0 auto 32px;
  position: relative;
}

.loading-orbit::after {
  content: '✦';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: var(--gold); font-size: 20px;
  animation: counterOrbit 1.5s linear infinite;
}

@keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes counterOrbit { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(-360deg)} }

.loading-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 300;
  color: var(--text-mid);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.loading-sub {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.1em;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

/* RESULT */
.result-header {
  text-align: center; padding: 48px 0 32px;
}

.result-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.4em;
  color: var(--gold); opacity: 0.7;
  text-transform: uppercase; margin-bottom: 16px;
}

.result-date {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.2em; margin-bottom: 24px;
}

/* Result Cards */
.result-section {
  margin-bottom: 16px;
}

.r-card {
  background: rgba(30,21,24,0.8);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 2px;
  padding: 24px 28px;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
}

.r-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, var(--gold), var(--gold-light));
}

.r-card.accent-magenta::before {
  background: linear-gradient(180deg, var(--magenta), var(--magenta-light));
}

.r-card.accent-teal::before {
  background: linear-gradient(180deg, var(--teal), var(--teal-light));
}

.r-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 0.25em;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 10px;
}

.r-card.accent-magenta .r-label { color: var(--magenta-light); }
.r-card.accent-teal .r-label { color: var(--teal-light); }

.r-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 3.5vw, 24px);
  font-weight: 400; color: var(--text-bright);
  margin-bottom: 10px; line-height: 1.4;
}

.r-body {
  font-size: 14px; line-height: 2;
  color: var(--text-mid);
}

.r-body strong { color: var(--gold-light); font-weight: 400; }
.r-card.accent-magenta .r-body strong { color: var(--magenta-light); }
.r-card.accent-teal .r-body strong { color: var(--teal-light); }

/* 一言カード */
.oneliner-card {
  background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(201,168,76,0.04));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 2px;
  padding: 32px;
  text-align: center;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}

.oneliner-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.oneliner-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 300; font-style: italic;
  color: var(--gold-light); line-height: 1.8;
}

/* CTA */
.cta-section {
  margin-top: 32px;
  background: rgba(30,21,24,0.8);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px; padding: 36px 32px;
  text-align: center;
  position: relative; overflow: hidden;
}

.cta-section::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.cta-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 4vw, 24px);
  font-weight: 300; color: var(--text-bright);
  line-height: 1.6; margin-bottom: 8px;
}

.cta-title em { font-style: italic; color: var(--gold-light); }

.cta-sub {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.9; margin-bottom: 24px;
}

.btn-engine {
  display: block;
  background: rgba(30,21,24,0.8);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--text-mid);
  font-family: 'Noto Serif JP', serif;
  font-size: 13px; letter-spacing: 0.1em;
  padding: 14px 24px; text-decoration: none;
  transition: all 0.25s; margin-bottom: 12px;
  text-align: center;
}

.btn-engine:hover {
  border-color: rgba(201,168,76,0.5);
  color: var(--gold-light);
}

.btn-line {
  display: block;
  background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.5);
  color: var(--gold-light);
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; letter-spacing: 0.12em;
  padding: 18px 32px; text-decoration: none;
  transition: all 0.3s; margin-bottom: 12px;
  text-align: center;
}

.btn-line:hover {
  border-color: var(--gold);
  box-shadow: 0 0 24px rgba(201,168,76,0.15);
}

.cta-note {
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.08em;
}

.restart-btn {
  display: inline-block; margin-top: 20px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--text-dim);
  font-family: 'Noto Serif JP', serif;
  font-size: 12px; padding: 10px 24px;
  cursor: pointer; letter-spacing: 0.1em;
  transition: all 0.25s;
}

.restart-btn:hover {
  border-color: rgba(201,168,76,0.4);
  color: var(--gold-light);
}

/* ERROR */
.error-msg {
  color: var(--magenta-light);
  font-size: 12px; text-align: center;
  margin-top: 12px; letter-spacing: 0.05em;
  display: none;
}
</style>
</head>
<body>
<div class="cosmos"></div>
<div class="page">

  <!-- COVER -->
  <div id="screen-cover" class="screen active">
    <div class="cover">
      <div class="cover-badge">LunaRa Lab × Soul RPG</div>
      <div class="cover-title">
        あなたが生まれ持った<em>本来のエンジン</em>
      </div>
      <div class="cover-line"><span>◆</span></div>
      <p class="cover-desc">
        今の自分の動き方は、<br>
        <strong>本来の自分</strong>と一致していますか？<br><br>
        生年月日から、<br>
        あなたが<strong>生まれ持ったエンジンタイプ</strong>を<br>解析します。<br><br>
        「なぜ自分はこう動くのか」——<br>
        その答えがここにあります。
      </p>

      <div class="input-card">
        <span class="input-label">生年月日を入力してください</span>
        <div class="date-row">
          <div class="date-field year">

              <option value="">日</option>
              <option value="1">1日</option>
              <option value="2">2日</option>
              <option value="3">3日</option>
              <option value="4">4日</option>
              <option value="5">5日</option>
              <option value="6">6日</option>
              <option value="7">7日</option>
              <option value="8">8日</option>
              <option value="9">9日</option>
              <option value="10">10日</option>
              <option value="11">11日</option>
              <option value="12">12日</option>
              <option value="13">13日</option>
              <option value="14">14日</option>
              <option value="15">15日</option>
              <option value="16">16日</option>
              <option value="17">17日</option>

        <div class="error-msg" id="error-msg">生年月日を正しく入力してください</div>

  <!-- LOADING -->

  <!-- RESULT -->

<script>
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getZodiacSign(month, day) {
  var m = parseInt(month), d = parseInt(day);
  if ((m===3&&d>=21)||(m===4&&d<=19)) return '牡羊座';
  if ((m===4&&d>=20)||(m===5&&d<=20)) return '牡牛座';
  if ((m===5&&d>=21)||(m===6&&d<=21)) return '双子座';
  if ((m===6&&d>=22)||(m===7&&d<=22)) return '蟹座';
  if ((m===7&&d>=23)||(m===8&&d<=22)) return '獅子座';
  if ((m===8&&d>=23)||(m===9&&d<=22)) return '乙女座';
  if ((m===9&&d>=23)||(m===10&&d<=23)) return '天秤座';
  if ((m===10&&d>=24)||(m===11&&d<=22)) return '蠍座';
  if ((m===11&&d>=23)||(m===12&&d<=21)) return '射手座';
  if ((m===12&&d>=22)||(m===1&&d<=19)) return '山羊座';
  if ((m===1&&d>=20)||(m===2&&d<=18)) return '水瓶座';
  return '魚座';
}

function getElement(zodiac) {
  var fire = ['牡羊座','獅子座','射手座'];
  var earth = ['牡牛座','乙女座','山羊座'];
  var air = ['双子座','天秤座','水瓶座'];
  if (fire.indexOf(zodiac) >= 0) return '火';
  if (earth.indexOf(zodiac) >= 0) return '地';
  if (air.indexOf(zodiac) >= 0) return '風';
  return '水';
}

function getLifePath(year, month, day) {
  var str = String(year) + String(month) + String(day);
  var sum = str.split('').reduce(function(a,b){ return a + parseInt(b); }, 0);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    var s = String(sum).split('');
    sum = s.reduce(function(a,b){ return a + parseInt(b); }, 0);
  }
  return sum;
}

function calcEngineType(year, month, day) {
  var zodiac = getZodiacSign(month, day);
  var element = getElement(zodiac);
  var lp = getLifePath(year, month, day);

  var typeData = {
    'IAM':         { name: '開拓者型', en: 'THE PIONEER',   sub: '存在エンジン' },
    'IFEEL':       { name: '感覚者型', en: 'THE FEELER',    sub: '五感エンジン' },
    'ICREATE':     { name: '表現者型', en: 'THE CREATOR',   sub: '創造エンジン' },
    'ILOVE':       { name: '愛着者型', en: 'THE NURTURER',  sub: '愛情エンジン' },
    'IEXPRESS':    { name: '伝達者型', en: 'THE MESSENGER', sub: '知性エンジン' },
    'ISEE':        { name: '設計者型', en: 'THE ARCHITECT', sub: '具現化エンジン' },
    'IUNDERSTAND': { name: '解放者型', en: 'THE VISIONARY', sub: '宇宙エンジン' }
  };

  var mainKey;
  if (element === '火') {
    mainKey = (lp===3||lp===6) ? 'ICREATE' : 'IAM';
  } else if (element === '地') {
    mainKey = (lp===2||lp===6) ? 'IFEEL' : 'ISEE';
  } else if (element === '風') {
    if (lp===5||lp===11) mainKey = 'IUNDERSTAND';
    else if (lp===3||lp===33) mainKey = 'ICREATE';
    else mainKey = 'IEXPRESS';
  } else {
    mainKey = (lp===2||lp===6) ? 'IFEEL' : 'ILOVE';
  }

  var lpMap = {1:'IAM',2:'ILOVE',3:'ICREATE',4:'ISEE',5:'IUNDERSTAND',6:'IFEEL',7:'ISEE',8:'IAM',9:'IUNDERSTAND',11:'IEXPRESS',22:'ISEE',33:'ICREATE'};
  var subKey = lpMap[lp] || 'IEXPRESS';
  if (subKey === mainKey) {
    var fallback = ['IAM','IFEEL','ICREATE','ILOVE','IEXPRESS','ISEE','IUNDERSTAND'];
    for (var i=0; i<fallback.length; i++) {
      if (fallback[i] !== mainKey) { subKey = fallback[i]; break; }
    }
  }

  return { main: typeData[mainKey], sub: typeData[subKey], mainKey: mainKey, subKey: subKey, zodiac: zodiac, element: element, lp: lp };
}

var typeTexts = {
  IAM: {
    why: '思考より先に体が動く。「なんかいける気がする」という感覚が起点で、決めた瞬間にエンジンが回り始める。動きながら考える方が自然。',

function startAnalysis() {
  var year = parseInt(document.getElementById('input-year').value);
  var month = parseInt(document.getElementById('input-month').value);
  var day = parseInt(document.getElementById('input-day').value);
  var errMsg = document.getElementById('error-msg');

  if (!year || !month || !day || year < 1940 || year > 2010) {
    errMsg.style.display = 'block';
    return;
  }
  errMsg.style.display = 'none';
  showScreen('screen-loading');

  setTimeout(function() {
    var result = calcEngineType(year, month, day);
    var birthdate = year + '年' + month + '月' + day + '日';
    showScreen('screen-result');
    renderResult(result, birthdate);
  }, 1800);
}
